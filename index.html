<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DoIt</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="screen-login" class="screen">
    <div class="card">
      <h1 class="logo">DoIt</h1>
      <p class="tagline">Organize o que precisa ser feito.</p>

      <form id="form-login" novalidate>
        <div class="field">
          <label for="login-email">E-mail</label>
          <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email" />
        </div>
        <div class="field">
          <label for="login-password">Senha</label>
          <input type="password" id="login-password" placeholder="Sua senha" autocomplete="current-password" />
        </div>
        <p class="error-msg" id="login-error"></p>
        <button type="submit" class="btn btn-primary btn-full">Entrar</button>
      </form>

      <p class="switch-screen">
        Não tem conta?
        <a href="#" id="go-register">Criar conta</a>
      </p>
    </div>
  </div>

  <div id="screen-register" class="screen hidden">
    <div class="card">
      <h1 class="logo">DoIt</h1>
      <p class="tagline">Crie sua conta gratuitamente.</p>

      <form id="form-register" novalidate>
        <div class="field">
          <label for="reg-email">E-mail</label>
          <input type="email" id="reg-email" placeholder="seu@email.com" autocomplete="email" />
        </div>
        <div class="field">
          <label for="reg-password">Senha</label>
          <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
        </div>
        <div class="field">
          <label for="reg-confirm">Confirmar senha</label>
          <input type="password" id="reg-confirm" placeholder="Repita a senha" autocomplete="new-password" />
        </div>
        <p class="error-msg" id="register-error"></p>
        <p class="success-msg" id="register-success"></p>
        <button type="submit" class="btn btn-primary btn-full">Cadastrar</button>
      </form>

      <p class="switch-screen">
        Já tem conta?
        <a href="#" id="go-login">Entrar</a>
      </p>
    </div>
  </div>

  <div id="screen-app" class="screen hidden">
    <div class="app-wrapper">

      <header class="app-header">
        <span class="logo-small">DoIt</span>
        <div class="header-right">
          <span class="user-email" id="user-email-display"></span>
          <button class="btn btn-ghost" id="btn-logout">Sair</button>
        </div>
      </header>

      <main class="app-main">

        <div class="add-task-area">
          <form id="form-add-task">
            <div class="add-task-row">
              <input
                type="text"
                id="task-input"
                placeholder="O que você precisa fazer?"
                maxlength="200"
                autocomplete="off"
              />
              <button type="submit" class="btn btn-primary">Adicionar</button>
            </div>
          </form>
        </div>

        <div class="filters">
          <button class="filter-btn active" data-filter="all">Todas</button>
          <button class="filter-btn" data-filter="pending">Pendentes</button>
          <button class="filter-btn" data-filter="completed">Concluídas</button>
        </div>

        <ul class="task-list" id="task-list"></ul>

        <div class="empty-state hidden" id="empty-state">
          <p>Nenhuma tarefa por aqui.</p>
          <span>Adicione uma tarefa acima para começar!</span>
        </div>

      </main>

      <footer class="app-footer">
        <span id="counter-pending">0 pendentes</span>
        <span class="separator">·</span>
        <span id="counter-completed">0 concluídas</span>
      </footer>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
